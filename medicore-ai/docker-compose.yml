version: '3.8'

services:
  backend:
    build: ./backend
    container_name: medicore-backend
    ports:
      - "8000:8000"
    environment:
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - PINECONE_API_KEY=${PINECONE_API_KEY}
      - PINECONE_INDEX_NAME=${PINECONE_INDEX_NAME}
      - CORS_ORIGINS=http://localhost:5173,http://localhost
    volumes:
      - ./backend:/app
      - ./textbooks:/textbooks
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: medicore-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    environment:
      - VITE_API_URL=http://localhost:8000
    restart: unless-stopped